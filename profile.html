<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil Pengguna - Aplikasi Belajar Fotografi</title>
    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <!-- External CSS -->
    <link rel="stylesheet" href="style.css">
    <style>
        .profile-avatar-large {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 4px solid var(--white);
            box-shadow: var(--shadow-md);
            object-fit: cover;
        }
        .avatar-container {
            position: relative;
            display: inline-block;
        }
        .avatar-edit-badge {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--primary-gradient);
            color: var(--white);
            display: flex;
            justify-content: center;
            align-items: center;
            border: 2px solid var(--white);
            font-size: 13px;
            cursor: pointer;
            box-shadow: var(--shadow-sm);
        }
        .cert-icon-box {
            width: 45px;
            height: 45px;
            border-radius: 12px;
            background-color: rgba(108, 92, 231, 0.1);
            color: var(--primary-color);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
        }
    </style>
</head>
<body>

    <!-- Simulated Mobile Device -->
    <div class="mobile-device">
        <!-- Device Notch -->
        <div class="device-notch"></div>
        
        <!-- Mock Status Bar -->
        <div class="device-header">
            <span>09:41</span>
            <div>
                <i class="bi bi-wifi mx-1"></i>
                <i class="bi bi-battery-full"></i>
            </div>
        </div>

        <!-- App Viewport -->
        <div class="app-content p-4 anim-fade-in" style="padding-bottom: 85px;">
            <!-- Profile Info Top -->
            <div class="text-center mb-4">
                <div class="avatar-container mb-3">
                    <img src="assets/mercy_profile.png" alt="Mercy Marshanda" class="profile-avatar-large">
                    <div class="avatar-edit-badge" onclick="alert('Buka galeri untuk mengubah foto profil!')">
                        <i class="bi bi-pencil-fill"></i>
                    </div>
                </div>
                <h4 class="fw-bold mb-1" style="font-size: 20px; letter-spacing: -0.5px;">Mercy Marshanda</h4>
                <span class="text-muted-text font-inter" style="font-size: 13px;">mercy@marshanda.com</span>
            </div>

            <!-- Profile Stats Grid -->
            <div class="d-flex gap-3 mb-4 text-center">
                <div class="glass-card p-3 flex-grow-1" style="box-shadow: var(--shadow-sm);">
                    <div class="fw-bold text-dark-text" style="font-size: 18px;">12</div>
                    <div class="text-muted-text font-inter" style="font-size: 10px; font-weight: 500; text-transform: uppercase;">Kelas</div>
                </div>
                <div class="glass-card p-3 flex-grow-1" style="box-shadow: var(--shadow-sm);">
                    <div class="fw-bold text-dark-text" style="font-size: 18px;">48</div>
                    <div class="text-muted-text font-inter" style="font-size: 10px; font-weight: 500; text-transform: uppercase;">Materi</div>
                </div>
                <div class="glass-card p-3 flex-grow-1" style="box-shadow: var(--shadow-sm);">
                    <div class="fw-bold text-dark-text" style="font-size: 18px;">5</div>
                    <div class="text-muted-text font-inter" style="font-size: 10px; font-weight: 500; text-transform: uppercase;">Tantangan</div>
                </div>
            </div>

            <!-- Certificates List -->
            <h5 class="fw-bold mb-3" style="font-size: 15px;">Sertifikat Anda</h5>
            
            <div class="d-flex flex-column gap-3 mb-4">
                <!-- Cert 1 -->
                <div class="certificate-card">
                    <div class="d-flex align-items-center gap-3">
                        <div class="cert-icon-box">
                            <i class="bi bi-file-earmark-pdf"></i>
                        </div>
                        <div>
                            <h6 class="fw-bold m-0" style="font-size: 12px; line-height: 1.4;">Sertifikat Fotografi Dasar</h6>
                            <span class="text-muted-text font-inter" style="font-size: 10px;">Lulus pada: Jan 2026</span>
                        </div>
                    </div>
                    <button class="btn btn-light btn-sm rounded-circle shadow-sm" onclick="downloadCert('Fotografi Dasar')" style="width: 36px; height: 36px; display: flex; justify-content: center; align-items: center;">
                        <i class="bi bi-download text-primary" style="color: var(--primary-color) !important;"></i>
                    </button>
                </div>

                <!-- Cert 2 -->
                <div class="certificate-card">
                    <div class="d-flex align-items-center gap-3">
                        <div class="cert-icon-box" style="background-color: rgba(225, 0, 255, 0.1); color: var(--accent-color);">
                            <i class="bi bi-file-earmark-pdf"></i>
                        </div>
                        <div>
                            <h6 class="fw-bold m-0" style="font-size: 12px; line-height: 1.4;">Sertifikat Teknik Komposisi</h6>
                            <span class="text-muted-text font-inter" style="font-size: 10px;">Lulus pada: Mar 2026</span>
                        </div>
                    </div>
                    <button class="btn btn-light btn-sm rounded-circle shadow-sm" onclick="downloadCert('Teknik Komposisi')" style="width: 36px; height: 36px; display: flex; justify-content: center; align-items: center;">
                        <i class="bi bi-download text-primary" style="color: var(--primary-color) !important;"></i>
                    </button>
                </div>

                <!-- Cert 3 -->
                <div class="certificate-card">
                    <div class="d-flex align-items-center gap-3">
                        <div class="cert-icon-box" style="background-color: rgba(0, 184, 148, 0.1); color: var(--success-color);">
                            <i class="bi bi-file-earmark-pdf"></i>
                        </div>
                        <div>
                            <h6 class="fw-bold m-0" style="font-size: 12px; line-height: 1.4;">Sertifikat Editing Foto</h6>
                            <span class="text-muted-text font-inter" style="font-size: 10px;">Lulus pada: Mei 2026</span>
                        </div>
                    </div>
                    <button class="btn btn-light btn-sm rounded-circle shadow-sm" onclick="downloadCert('Editing Foto')" style="width: 36px; height: 36px; display: flex; justify-content: center; align-items: center;">
                        <i class="bi bi-download text-primary" style="color: var(--primary-color) !important;"></i>
                    </button>
                </div>
            </div>

            <!-- Profile Menu & Actions -->
            <button class="btn btn-outline-custom w-100 py-3 mb-3" onclick="alert('Edit Profil: Fitur ini akan segera tersedia pada versi berikutnya!')">
                <i class="bi bi-person-gear me-1"></i> Edit Profil
            </button>
            <button class="btn btn-light w-100 py-3 text-danger border border-danger-subtle rounded-20" onclick="window.location.href='login.html'" style="font-weight: 600;">
                <i class="bi bi-box-arrow-right me-1"></i> Keluar (Logout)
            </button>
        </div>

        <!-- Persistent Bottom Navigation -->
        <div class="bottom-nav">
            <a href="index.html" class="bottom-nav-item">
                <i class="bi bi-house-door"></i>
                <span>Home</span>
            </a>
            <a href="categories.html" class="bottom-nav-item">
                <i class="bi bi-book"></i>
                <span>Kelas</span>
            </a>
            <a href="challenge.html" class="bottom-nav-item">
                <i class="bi bi-trophy"></i>
                <span>Tantangan</span>
            </a>
            <a href="profile.html" class="bottom-nav-item active">
                <i class="bi bi-person-fill"></i>
                <span>Profil</span>
            </a>
        </div>
    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Simulate Downloading Certificate
        function downloadCert(certName) {
            alert("Sedang mengunduh Sertifikat '" + certName + "' (PDF)...\nUnduhan akan selesai dalam beberapa detik.");
        }
    </script>
</body>
</html>
