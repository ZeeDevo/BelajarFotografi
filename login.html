<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Aplikasi Belajar Fotografi</title>
    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <!-- External CSS -->
    <link rel="stylesheet" href="style.css">
    <style>
        .login-header-img {
            height: 190px;
            position: relative;
            background: url('assets/class_cover.png') no-repeat center center;
            background-size: cover;
        }
        .login-header-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, rgba(108, 92, 231, 0.2), #f6f8fc);
        }
        .login-card-wrapper {
            margin-top: -30px;
            border-top-left-radius: 30px;
            border-top-right-radius: 30px;
            background-color: var(--white);
            padding: 30px 24px;
            flex: 1;
            box-shadow: 0 -10px 30px rgba(108, 92, 231, 0.05);
        }
        .app-logo-small {
            width: 45px;
            height: 45px;
            border-radius: 12px;
            background: var(--primary-gradient);
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--white);
            font-size: 20px;
            box-shadow: 0 4px 10px rgba(108, 92, 231, 0.3);
        }
    </style>
</head>
<body>

    <!-- Simulated Mobile Device -->
    <div class="mobile-device">
        <!-- Device Notch -->
        <div class="device-notch"></div>
        
        <!-- Mock Status Bar -->
        <div class="device-header">
            <span>09:41</span>
            <div>
                <i class="bi bi-wifi mx-1"></i>
                <i class="bi bi-battery-full"></i>
            </div>
        </div>

        <!-- App Viewport -->
        <div class="app-content p-0" style="padding-bottom: 0 !important;">
            <!-- Header Illustration -->
            <div class="login-header-img">
                <div class="login-header-overlay"></div>
                <div class="position-absolute top-0 start-0 p-4">
                    <div class="app-logo-small">
                        <i class="bi bi-camera2"></i>
                    </div>
                </div>
            </div>

            <!-- Login Content Box -->
            <div class="login-card-wrapper d-flex flex-column justify-content-between anim-fade-in">
                <div>
                    <h2 class="fw-bold mb-1" style="font-size: 24px;">Selamat Datang!</h2>
                    <p class="text-muted-text font-inter mb-4" style="font-size: 13px;">
                        Masuk untuk melanjutkan perjalanan belajarmu menjadi fotografer profesional.
                    </p>

                    <!-- Login Form -->
                    <form id="loginForm" action="index.html" method="GET">
                        <!-- Email Input -->
                        <div class="form-floating mb-3">
                            <input type="email" class="form-control" id="loginEmail" placeholder="name@example.com" required value="mercy@marshanda.com">
                            <label for="loginEmail"><i class="bi bi-envelope me-2"></i>Email Address</label>
                        </div>
                        
                        <!-- Password Input -->
                        <div class="form-floating mb-2">
                            <input type="password" class="form-control" id="loginPassword" placeholder="Password" required value="password123">
                            <label for="loginPassword"><i class="bi bi-lock me-2"></i>Password</label>
                        </div>

                        <!-- Forgot Password Link -->
                        <div class="d-flex justify-content-end mb-4">
                            <a href="#" class="text-decoration-none" style="font-size: 13px; color: var(--primary-color); font-weight: 500;">Lupa Password?</a>
                        </div>

                        <!-- Login Button -->
                        <button type="submit" class="btn-gradient w-100 py-3 mb-3">
                            Login <i class="bi bi-box-arrow-in-right ms-1"></i>
                        </button>
                    </form>

                    <!-- Divider -->
                    <div class="d-flex align-items-center my-3">
                        <hr class="flex-grow-1 border-secondary-subtle">
                        <span class="mx-3 text-muted-text font-inter" style="font-size: 12px; text-transform: uppercase; letter-spacing: 1px;">atau masuk dengan</span>
                        <hr class="flex-grow-1 border-secondary-subtle">
                    </div>

                    <!-- Social Sign-in Button -->
                    <button class="btn-social w-100 py-3 mb-4" onclick="window.location.href='index.html'">
                        <!-- Simple Styled SVG or Bootstrap Google Icon -->
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-google" viewBox="0 0 16 16" style="color: #ea4335;">
                            <path d="M15.545 6.558a9.42 9.42 0 0 1 .139 1.626c0 2.434-.87 4.492-2.384 5.885h.002C11.978 15.292 10.158 16 8 16A8 8 0 1 1 8 0c2.204 0 4.086.799 5.547 2.174l-2.037 2.037C10.422 3.28 9.355 3 8 3c-2.451 0-4.537 1.565-5.28 3.73a4.773 4.773 0 0 0 0 3.54C3.463 12.435 5.549 14 8 14c1.88 0 3.353-.618 4.47-1.684.97-.922 1.614-2.27 1.614-4.526 0-.256-.026-.547-.078-.768h-5.91v-2.8h8.045Z"/>
                        </svg>
                        Google Account
                    </button>
                </div>

                <!-- Footer Register Redirect -->
                <div class="text-center font-inter" style="font-size: 13px;">
                    <span class="text-muted-text">Belum punya akun?</span>
                    <a href="register.html" class="text-decoration-none ms-1" style="color: var(--primary-color); font-weight: 600;">Daftar Sekarang</a>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
