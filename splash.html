<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Splash Screen - Aplikasi Belajar Fotografi</title>
    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <!-- External CSS -->
    <link rel="stylesheet" href="style.css">
    <style>
        .splash-container {
            background: var(--bg-gradient);
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 60px 24px;
            color: var(--white);
            text-align: center;
        }
        .logo-box {
            width: 140px;
            height: 140px;
            border-radius: 35px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            margin-bottom: 20px;
        }
        .logo-box i {
            font-size: 70px;
            background: linear-gradient(135deg, #ffffff 0%, #e100ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .loading-dots span {
            width: 8px;
            height: 8px;
            margin: 0 4px;
            background-color: var(--white);
            border-radius: 50%;
            display: inline-block;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .loading-dots span:nth-child(1) { animation-delay: -0.32s; }
        .loading-dots span:nth-child(2) { animation-delay: -0.16s; }
        
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1.0); }
        }
    </style>
</head>
<body>

    <!-- Simulated Mobile Device -->
    <div class="mobile-device">
        <!-- Device Notch -->
        <div class="device-notch"></div>
        
        <!-- Mock Status Bar -->
        <div class="device-header dark">
            <span>09:41</span>
            <div>
                <i class="bi bi-wifi mx-1"></i>
                <i class="bi bi-battery-full"></i>
            </div>
        </div>

        <!-- App Viewport -->
        <div class="app-content p-0" style="padding-bottom: 0 !important;">
            <div class="splash-container">
                <!-- Top Spacing -->
                <div></div>

                <!-- Central Branding -->
                <div class="d-flex flex-column align-items-center anim-fade-in">
                    <div class="logo-box anim-float">
                        <i class="bi bi-camera2"></i>
                    </div>
                    <h1 class="fw-bold mt-3 text-white mb-2" style="font-size: 26px; letter-spacing: -0.5px;">
                        Belajar<span style="color: var(--accent-color);">Fotografi</span>
                    </h1>
                    <p class="text-white opacity-75 fs-6 px-3 font-nunito" style="font-weight: 300;">
                        "Belajar Fotografi dari Dasar hingga Profesional"
                    </p>
                </div>

                <!-- Bottom Loader -->
                <div class="mb-4">
                    <div class="loading-dots mb-2">
                        <span></span>
                        <span></span>
                        <span></span>
                    </div>
                    <span class="text-white opacity-50 font-inter" style="font-size: 11px; letter-spacing: 1px; text-transform: uppercase;">
                        Mempersiapkan Materi...
                    </span>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Redirect to onboarding.html after 3 seconds
        setTimeout(function() {
            window.location.href = 'onboarding.html';
        }, 3000);
    </script>
</body>
</html>
